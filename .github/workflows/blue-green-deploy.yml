name: Blue-Green Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "src/**"
      - "Dockerfile"
      - "docker-compose*.yml"

permissions:
  contents: read
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build and push container image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-green:
    name: Deploy to green environment
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'staging' }}-green
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy green instance
        run: |
          echo "Deploying ${{ needs.build.outputs.image_tag }} to green environment"
          # Replace with actual deployment command for your platform:
          # - Cloud Run: gcloud run deploy quipay-green --image $IMAGE ...
          # - Kubernetes: kubectl set image deployment/quipay-green app=$IMAGE
          # - Docker Compose: docker compose -f docker-compose.green.yml up -d

      - name: Wait for green to be healthy
        run: |
          echo "Waiting for green environment health check..."
          MAX_RETRIES=30
          RETRY_INTERVAL=5
          for i in $(seq 1 $MAX_RETRIES); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${GREEN_URL}/health" || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Green environment is healthy"
              exit 0
            fi
            echo "Attempt $i/$MAX_RETRIES: status=$HTTP_STATUS, retrying in ${RETRY_INTERVAL}s..."
            sleep $RETRY_INTERVAL
          done
          echo "Green environment failed to become healthy"
          exit 1
        env:
          GREEN_URL: ${{ secrets.GREEN_ENVIRONMENT_URL }}

  smoke-test:
    name: Run smoke tests against green
    needs: deploy-green
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run smoke tests
        run: |
          GREEN_URL="${{ secrets.GREEN_ENVIRONMENT_URL }}"

          echo "Running smoke tests against $GREEN_URL"

          # Health endpoint
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$GREEN_URL/health")
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: /health returned $STATUS"
            exit 1
          fi
          echo "PASS: /health"

          # API readiness
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$GREEN_URL/api/health")
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: /api/health returned $STATUS"
            exit 1
          fi
          echo "PASS: /api/health"

          echo "All smoke tests passed"

  cutover:
    name: Switch traffic to green
    needs: smoke-test
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'staging' }}
    steps:
      - name: Switch load balancer to green
        run: |
          echo "Switching traffic from blue to green"
          # Replace with actual traffic switch command:
          # - Cloud Run: gcloud run services update-traffic quipay --to-latest
          # - Kubernetes: kubectl patch service quipay -p '{"spec":{"selector":{"slot":"green"}}}'
          # - Nginx: update upstream config and reload

      - name: Verify production traffic
        run: |
          echo "Verifying production is serving from green..."
          PROD_URL="${{ secrets.PRODUCTION_URL }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_URL/health")
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: Production health check failed after cutover"
            exit 1
          fi
          echo "PASS: Production is healthy on green"

      - name: Record deployment
        run: |
          echo "Deployment completed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Image: ${{ needs.build.outputs.image_tag || 'N/A' }}"
          echo "Keep blue alive for 10 minutes as rollback target"

  monitor:
    name: Post-cutover monitoring
    needs: cutover
    runs-on: ubuntu-latest
    steps:
      - name: Monitor error rate for 5 minutes
        run: |
          echo "Monitoring error rate post-cutover..."
          PROD_URL="${{ secrets.PRODUCTION_URL }}"
          CHECKS=10
          INTERVAL=30
          FAILURES=0

          for i in $(seq 1 $CHECKS); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_URL/health" || echo "000")
            if [ "$STATUS" != "200" ]; then
              FAILURES=$((FAILURES + 1))
            fi
            echo "Check $i/$CHECKS: status=$STATUS (failures=$FAILURES)"
            if [ $i -lt $CHECKS ]; then
              sleep $INTERVAL
            fi
          done

          ERROR_RATE=$((FAILURES * 100 / CHECKS))
          echo "Error rate: ${ERROR_RATE}%"

          if [ "$ERROR_RATE" -gt 5 ]; then
            echo "ERROR: Error rate ${ERROR_RATE}% exceeds 5% threshold"
            echo "TRIGGERING AUTOMATIC ROLLBACK"
            exit 1
          fi

          echo "Deployment stable. Error rate within acceptable threshold."

  rollback:
    name: Automatic rollback on failure
    needs: monitor
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Rollback to blue
        run: |
          echo "ROLLING BACK: Switching traffic back to blue"
          # Replace with actual rollback command:
          # - Cloud Run: gcloud run services update-traffic quipay --to-revisions=PREVIOUS=100
          # - Kubernetes: kubectl patch service quipay -p '{"spec":{"selector":{"slot":"blue"}}}'

      - name: Verify rollback
        run: |
          PROD_URL="${{ secrets.PRODUCTION_URL }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_URL/health")
          if [ "$STATUS" = "200" ]; then
            echo "Rollback successful. Blue is serving traffic."
          else
            echo "WARNING: Rollback may have failed. Manual intervention required."
            exit 1
          fi

      - name: Notify team of rollback
        if: always()
        run: |
          echo "Rollback triggered for deployment ${{ github.sha }}"
          echo "Reason: Error rate exceeded 5% threshold post-cutover"
