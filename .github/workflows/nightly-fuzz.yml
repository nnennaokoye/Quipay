name: Nightly Security

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  manual-fuzz-harness:
    name: Manual fuzz harness (payroll_vault)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Run manual fuzz test
        run: |
          cd contracts/payroll_vault
          cargo test test_manual_fuzz -- --nocapture

  kani-proofs:
    name: Symbolic execution (Kani)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - name: Install Kani
        run: |
          cargo install --locked kani-verifier
          cargo kani setup
      - name: Run Kani proofs
        run: |
          cd contracts/payroll_vault
          cargo kani --features testutils

  fuzz-payroll-stream:
    name: Fuzz payroll_stream for 30m
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Rust nightly toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y clang llvm libclang-dev

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Cache fuzz build artifacts
        uses: actions/cache@v5
        with:
          path: |
            fuzz/target
            fuzz/corpus
          key: ${{ runner.os }}-fuzz-${{ github.ref_name }}-${{ hashFiles('fuzz/Cargo.toml', 'fuzz/fuzz_targets/**/*.rs', 'contracts/payroll_stream/**') }}
          restore-keys: |
            ${{ runner.os }}-fuzz-${{ github.ref_name }}-
            ${{ runner.os }}-fuzz-

      - name: Run payroll_stream fuzz target (30 minutes)
        working-directory: fuzz
        run: cargo fuzz run payroll_stream_fuzz -- -max_total_time=1800

      - name: Upload fuzz corpus and artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: payroll-stream-fuzz-corpus-and-artifacts
          path: |
            fuzz/corpus/payroll_stream_fuzz
            fuzz/artifacts/payroll_stream_fuzz
          if-no-files-found: ignore
